<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daksh Bagga — Enterprise Solutions Engineer, Customer-Facing AI">
  <defs>
    <linearGradient id="ascii" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7F5AF0"/>
      <stop offset="0.5" stop-color="#7CF5C9">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#00B4D8"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="340" rx="20"/></clipPath>
  </defs>

  <!-- terminal window -->
  <rect width="1200" height="340" rx="20" fill="#0B0E14"/>
  <rect x="1" y="1" width="1198" height="338" rx="19" fill="none" stroke="#1F2733" stroke-width="2"/>

  <!-- title bar -->
  <g clip-path="url(#frame)"><rect width="1200" height="44" fill="#11161F"/></g>
  <line x1="0" y1="44" x2="1200" y2="44" stroke="#1F2733" stroke-width="2"/>
  <circle cx="28" cy="22" r="7" fill="#FF5F56"/>
  <circle cx="52" cy="22" r="7" fill="#FFBD2E"/>
  <circle cx="76" cy="22" r="7" fill="#27C93F"/>
  <text x="600" y="27" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#5B6675">daksh@github: ~/profile</text>

  <!-- ASCII art name (equal-length lines, centered) -->
  <text x="600" y="98" text-anchor="middle" xml:space="preserve" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="url(#ascii)">
    <tspan x="600" dy="0"> ____    _    _  ______  _   _   ____    _    ____  ____    _    </tspan>
    <tspan x="600" dy="20">|  _ \  / \  | |/ / ___|| | | | | __ )  / \  / ___|/ ___|  / \   </tspan>
    <tspan x="600" dy="20">| | | |/ _ \ | ' /\___ \| |_| | |  _ \ / _ \| |  _| |  _  / _ \  </tspan>
    <tspan x="600" dy="20">| |_| / ___ \| . \ ___) |  _  | | |_) / ___ \ |_| | |_| |/ ___ \ </tspan>
    <tspan x="600" dy="20">|____/_/   \_\_|\_\____/|_| |_| |____/_/   \_\____|\____/_/   \_\</tspan>
  </text>

  <!-- prompt line with blinking cursor (centered) -->
  <text x="600" y="232" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#C9D1D9">
    <tspan fill="#2CB67D" font-weight="700">&gt; </tspan>ENTERPRISE SOLUTIONS ENGINEER · CUSTOMER-FACING AI<tspan fill="#2CB67D" font-weight="700">&#9608;<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></tspan>
  </text>

  <!-- bobbing ASCII wave rows -->
  <g clip-path="url(#frame)" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" text-anchor="middle" xml:space="preserve">
    <text x="600" y="282" fill="#7F5AF0" opacity="0.40">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0; 0 4; 0 0" dur="3.6s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="304" fill="#2CB67D" opacity="0.55">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 4; 0 0; 0 -4; 0 0" dur="4.4s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="324" fill="#00B4D8" opacity="0.70">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0; 0 3; 0 0" dur="5.2s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
