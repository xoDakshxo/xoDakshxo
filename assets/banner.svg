<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daksh Bagga — Enterprise Solutions Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#10243A"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7F5AF0"/>
      <stop offset="1" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2CB67D"/>
      <stop offset="1" stop-color="#7F5AF0"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#E8F6FF"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>

  <!-- moving wave layers (clipped to the rounded rect via overflow) -->
  <g opacity="0.18">
    <path d="M -600 230 q 75 -34 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 L 1800 320 L -600 320 Z" fill="url(#wave1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="300 0" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>
  <g opacity="0.22">
    <path d="M -600 252 q 75 -28 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 L 1800 320 L -600 320 Z" fill="url(#wave2)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-300 0" dur="5.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <g opacity="0.30">
    <path d="M -600 274 q 75 -22 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 t 150 0 L 1800 320 L -600 320 Z" fill="url(#wave1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="300 0" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- name + subtitle -->
  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="6" fill="url(#ink)">DAKSH BAGGA</text>
  <text x="600" y="196" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="5" fill="#9FE7C9">ENTERPRISE SOLUTIONS ENGINEER &#183; CUSTOMER-FACING AI</text>
</svg>
