<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daksh Bagga — Enterprise Solutions Engineer, AI and Voice Systems">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7F5AF0"/>
      <stop offset="0.5" stop-color="#2CB67D"/>
      <stop offset="1" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="260" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="260" rx="20" fill="url(#fade)"/>

  <!-- soft light orbs -->
  <circle cx="180" cy="60" r="160" fill="url(#glow)"/>
  <circle cx="1040" cy="220" r="200" fill="url(#glow)"/>

  <!-- flowing waves -->
  <path d="M0 196 C 220 150, 380 250, 620 200 S 1000 150, 1200 198 L 1200 260 L 0 260 Z" fill="#ffffff" fill-opacity="0.08"/>
  <path d="M0 220 C 260 184, 440 264, 700 222 S 1040 184, 1200 224 L 1200 260 L 0 260 Z" fill="#ffffff" fill-opacity="0.10"/>

  <!-- text -->
  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="1">Daksh Bagga</text>
  <text x="600" y="166" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#EAF6FF" letter-spacing="3">ENTERPRISE SOLUTIONS ENGINEER &#183; AI &amp; VOICE SYSTEMS</text>
</svg>
